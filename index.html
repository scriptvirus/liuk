<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🦉虾虾的系统🦉</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  }
  body {
    display: flex;
    height: 100vh;
    overflow: hidden;
    background: #f8f5ff;
  }

  /* 左侧边栏 严格使用 #A895B8F3 */
  .sidebar {
    width: 260px;
    background: #A895B8F3;
    padding: 36px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    box-shadow: 3px 0 20px rgba(147, 118, 185, 0.15);
  }

  .sidebar h2 {
    color: #fff;
    text-align: center;
    font-size: 20px;
    margin-bottom: 16px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
  }

  /* 链接样式 */
  .link-item {
    padding: 16px 14px;
    color: #fff;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
    text-decoration: none;
    border-radius: 14px;
  }
  .link-item:hover {
    background: rgba(255,255,255,0.2);
    transform: translateY(-3px);
  }

  /* 右侧内容区 */
  .container {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 28px;
  }
  .content {
    flex: 1;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.05);
    overflow: hidden;
  }
  #frame {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* 底部标识 —— 5个爱心，单独hover变羊 */
  .footer {
    text-align: center;
    padding: 14px 0;
    font-size: 19px;
    font-weight: bold;
    color: #A895B8;
  }
  .heart-item {
    cursor: pointer;
    display: inline-block;
  }
  .heart-item:hover .icon {
    display: none;
  }
  .heart-item:hover::after {
    content: "🐑";
  }
</style>
</head>
<body>

<div class="sidebar">
  <h2>🦉虾虾的系统🦉</h2>
  <a class="link-item" onclick="openPage('page7.html')">虾记事本</a>
  <a class="link-item" onclick="openPage('page1.html')">批量替换</a>
  <a class="link-item" onclick="openPage('page2.html')">案件统计</a>
  <a class="link-item" onclick="openPage('page3.html')">新增案件</a>
  <a class="link-item" onclick="openPage('page4.html')">诉讼费用</a>
  <a class="link-item" onclick="openPage('page5.html')">同比计算</a>
  <a class="link-item" onclick="openPage('page6.html')">逾期应收</a>
  <a class="link-item" onclick="openPage('page8.html')">差旅计算</a>
</div>

<div class="container">
  <div class="content">
    <iframe id="frame"></iframe>
  </div>
  <div class="footer">
    <span class="heart-item"><span class="icon">💜</span></span>
    <span class="heart-item"><span class="icon">💜</span></span>
    <span class="heart-item"><span class="icon">💜</span></span>
    <span class="heart-item"><span class="icon">💜</span></span>
    <span class="heart-item"><span class="icon">💜</span></span>
  </div>
</div>

<script>
  function openPage(url) {
    document.getElementById('frame').src = url;
    return false; // 阻止a标签默认行为
  }
  window.onload = () => openPage('page1.html');
</script>
</body>
</html>
